name: zirvego_yonetici
description: "ZirveGo Yönetici Uygulaması - Kurumsal Yönetim Paneli"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # ── UI & İkonlar ──────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.3
  fl_chart: ^0.70.2

  # ── State Management ─────────────────────────────────────
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  provider: ^6.1.5

  # ── Navigation ────────────────────────────────────────────
  go_router: ^15.1.2

  # ── Firebase ──────────────────────────────────────────────
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_analytics: ^11.4.4
  firebase_crashlytics: ^4.3.4

  # ── Yerel Depolama ────────────────────────────────────────
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # ── Harita ────────────────────────────────────────────────
  google_maps_flutter: ^2.9.0

  # ── Network ───────────────────────────────────────────────
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # ── Yardımcı ─────────────────────────────────────────────
  intl: ^0.20.2
  logger: ^2.5.0
  image_picker: ^1.1.2
  permission_handler: ^11.4.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  uuid: ^4.5.1
  get_it: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # Fontlar google_fonts paketi ile yükleniyor (yerel dosya gerekmez)
