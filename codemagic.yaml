workflows:
  # ── iOS Build (CodeMagic Default) ───────────────────────────────────────────
  ios-release:
    name: ZirveGo iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: ZirveGo_ASC
    environment:
      ios_signing:
        distribution_type: app_store   # veya: ad_hoc | development
        bundle_identifier: com.zirvego.yonetici
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.zirvego.yonetici
        APP_NAME: "ZirveGo Yönetici"
    scripts:
      - name: Firebase google-services.json ve GoogleService-Info.plist kontrol
        script: |
          [ -f ios/Runner/GoogleService-Info.plist ] || \
            { echo "GoogleService-Info.plist eksik!"; exit 1; }
      - name: Flutter bağımlılıkları
        script: flutter pub get
      - name: Flutter analiz
        script: flutter analyze --no-fatal-infos
      - name: CocoaPods kurulum
        script: find . -name "Podfile" -execdir pod install \;
      - name: iOS Release Build
        script: |
          flutter build ipa \
            --release \
            --build-name=$PROJECT_BUILD_NUMBER \
            --build-number=$PROJECT_BUILD_NUMBER \
            --dart-define=FLAVOR=production
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - admin@zirvego.com
        notify:
          success: true
          failure: true

  # ── Android Release (Android Studio ile APK alınacak - referans) ─────────────
  android-debug:
    name: ZirveGo Android Debug (CI)
    max_build_duration: 45
    instance_type: linux_x2
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: com.zirvego.yonetici
    scripts:
      - name: Firebase google-services.json kontrol
        script: |
          [ -f android/app/google-services.json ] || \
            { echo "google-services.json eksik!"; exit 1; }
      - name: Flutter bağımlılıkları
        script: flutter pub get
      - name: Flutter analiz
        script: flutter analyze --no-fatal-infos
      - name: Flutter Test
        script: flutter test
      - name: Android Debug APK
        script: |
          flutter build apk \
            --debug \
            --build-name=$PROJECT_BUILD_NUMBER \
            --build-number=$PROJECT_BUILD_NUMBER
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - admin@zirvego.com
        notify:
          success: true
          failure: true
